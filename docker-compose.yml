version: '3.8'

networks:
  crm_network:
    driver: bridge

# ==============================================================
# WOOTECH CRM — STACK COMPLETA DE LEAD INTELLIGENCE
# 12 ferramentas open source self-hosted
# ==============================================================

services:

  # ── 1. CRM App Principal (Vite + Express + BullMQ) ──────────
  crm-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/fluowai/wootechcrm6:latest
    container_name: wootech_crm_app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL:-}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY:-}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-}
      # Serviços internos
      - REDIS_URL=redis://redis:6379
      - SCRAPER_API_URL=http://google-maps-scraper:8080        # gosom (1)
      - BROWSERLESS_URL=ws://browserless:3000                  # Playwright/Puppeteer (7/8)
      - BROWSERLESS_TOKEN=${BROWSERLESS_TOKEN:-wootech-token}
      - FIRECRAWL_URL=http://firecrawl:3002                   # Firecrawl (12)
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY:-local}
      - UNSTRUCTURED_URL=http://unstructured:8000              # Unstructured (11)
      - CNPJ_SERVICE_URL=http://cnpj-service:4000             # CNPJ Pipeline (6)
      - COLLY_SERVICE_URL=http://colly-service:5000           # Colly Go Crawler (complementar)
      - WHATSAPP_API_URL=http://whatsapp-service:8080         # Whatsmeow (complementar)
      # AI-BOS Services
      - PAPERCLIP_URL=http://paperclip:4100                   # Agent runtime (interno)
      - PAPERCLIP_SECRET_KEY=${PAPERCLIP_SECRET_KEY:-wootech-paperclip-secret-change-in-prod}
      - OLLAMA_URL=http://ollama:11434                        # LLM local backup
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1:8b}
      # LLM Provider API Keys (fallback chain)
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - CEREBRAS_API_KEY=${CEREBRAS_API_KEY:-}
      - NVIDIA_NIM_API_KEY=${NVIDIA_NIM_API_KEY:-}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - HUGGINGFACE_API_KEY=${HUGGINGFACE_API_KEY:-}
      - COHERE_API_KEY=${COHERE_API_KEY:-}
      - CLOUDFLARE_API_KEY=${CLOUDFLARE_API_KEY:-}
      - PUTER_API_KEY=${PUTER_API_KEY:-}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.wootechcrm.rule=Host(`crm.suaempresa.com`)"
      - "traefik.http.routers.wootechcrm.entrypoints=websecure"
      - "traefik.http.routers.wootechcrm.tls.certresolver=letsencrypt"
      - "traefik.http.services.wootechcrm.loadbalancer.server.port=3000"
    depends_on:
      - postgres
      - redis
      - whatsapp-service
      - google-maps-scraper
      - browserless
      - firecrawl
      - cnpj-service
      - colly-service
      - paperclip
      - ollama
    networks:
      - crm_network

  # ── 2. PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: crm-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-crm_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - crm_network

  # ── 3. Redis (BullMQ + Pub/Sub WhatsApp) ─────────────────────
  redis:
    image: redis:7-alpine
    container_name: crm-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    networks:
      - crm_network

  # ── FERRAMENTA 1: Google Maps Scraper (gosom) ─────────────────
  # https://github.com/gosom/google-maps-scraper
  # Extrai: nome, telefone, site, email, lat/lng, avaliações, horário
  # API: POST /api/v1/search | GET /api/v1/jobs/:id
  google-maps-scraper:
    image: gosom/google-maps-scraper:latest
    container_name: gmaps-scraper
    restart: always
    ports:
      - "8000:8080"
    environment:
      - PORT=8080
      - PLAYWRIGHT_HEADLESS=true
      - CONCURRENCY=2
      - DATABASE_URL=${DATABASE_URL:-}
      - CACHE_DIR=/data/cache
    volumes:
      - gosom_data:/data
    networks:
      - crm_network

  # ── FERRAMENTAS 7+8: Browserless Chrome (Playwright + Puppeteer) ──
  # https://github.com/microsoft/playwright
  # https://github.com/puppeteer/puppeteer
  # Acesso via CDP WebSocket — usado pelo scraper.ts e Crawlee
  browserless:
    image: ghcr.io/browserless/chromium:latest
    container_name: browserless
    restart: always
    ports:
      - "3001:3000"
    environment:
      - CONCURRENT=10
      - TIMEOUT=60000
      - TOKEN=${BROWSERLESS_TOKEN:-wootech-token}
      - QUEUE_LENGTH=20
      - DEMO_MODE=false
      - PREBOOT_CHROME=true
      - KEEP_ALIVE=true
    shm_size: '2gb'
    networks:
      - crm_network

  # ── FERRAMENTA 9: Crawlee (integrado no enrichment-service Node.js) ──
  # https://github.com/apify/crawlee
  # Roda dentro do enrichment-service como library — sem container separado

  # ── FERRAMENTA 10: Cheerio (integrado no enrichment-service Node.js) ──
  # https://github.com/cheeriojs/cheerio
  # Roda dentro do enrichment-service como library — sem container separado

  # ── FERRAMENTA 12: Firecrawl (self-hosted) ───────────────────
  # https://github.com/mendableai/firecrawl
  # Transforma qualquer site em Markdown/JSON estruturado
  # API: POST /v1/scrape | POST /v1/crawl
  firecrawl:
    image: ghcr.io/mendableai/firecrawl:latest
    container_name: firecrawl
    restart: always
    ports:
      - "3002:3002"
    environment:
      - REDIS_URL=redis://redis:6379
      - PLAYWRIGHT_MICROSERVICE_URL=http://browserless:3000
      - USE_DB_AUTHENTICATION=false
      - PORT=3002
      - HOST=0.0.0.0
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY:-local}
      - NUM_WORKERS_PER_QUEUE=4
      - BULL_AUTH_KEY=wootech-firecrawl
    depends_on:
      - redis
      - browserless
    networks:
      - crm_network

  # ── FERRAMENTA 11: Unstructured (extração de PDFs, DOCX, XLSX) ──
  # https://github.com/Unstructured-IO/unstructured
  # API: POST /general/v0/general  Content-Type: multipart/form-data
  unstructured:
    image: downloads.unstructured.io/unstructured-io/unstructured-api:latest
    container_name: unstructured
    restart: always
    ports:
      - "8003:8000"
    environment:
      - PORT=8000
      - UNSTRUCTURED_API_KEY=${UNSTRUCTURED_API_KEY:-local}
    networks:
      - crm_network

  # ── FERRAMENTA 6: CNPJ Service (Node.js — Receita Federal) ───
  # Pipeline CNPJ self-hosted: BrasilAPI + cache PostgreSQL local
  # Rotas: GET /cnpj/:cnpj  |  GET /cnpj/:cnpj/socios  |  GET /cnpj/search?nome=
  cnpj-service:
    build:
      context: ./cnpj-service
      dockerfile: Dockerfile
    container_name: cnpj-service
    restart: always
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-crm_db}
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
    networks:
      - crm_network

  # ── Colly Crawler Service (Go) ────────────────────────────────
  # Colly: https://github.com/gocolly/colly
  # Crawler ultra-rápido em Go — complementa o Browserless
  # API: POST /crawl { url, depth, extractEmails, extractPhones }
  colly-service:
    build:
      context: ./colly-service
      dockerfile: Dockerfile
    container_name: colly-service
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
    networks:
      - crm_network

  # ── AI-BOS: Paperclip Agent Runtime ─────────────────────────
  # https://github.com/paperclipai/paperclip
  # Runtime invisível para agentes autônomos — compartilha DB com CRM
  # Dashboard interno: http://localhost:4100 (nunca expor externamente)
  paperclip:
    image: ghcr.io/paperclipai/paperclip:latest
    container_name: paperclip
    restart: always
    ports:
      - "127.0.0.1:4100:4100"
    environment:
      - PORT=4100
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-crm_db}
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
      - LOG_LEVEL=info
      - SECRET_KEY=${PAPERCLIP_SECRET_KEY:-wootech-paperclip-secret-change-in-prod}
    depends_on:
      - postgres
      - redis
    networks:
      - crm_network

  # ── AI-BOS: Ollama Local LLM (Backup Ultimate) ──────────────
  # https://github.com/ollama/ollama
  # LLM local sem rate limits — seguro quando nuvens falham
  # Modelo padrão: llama3.1:8b (4GB RAM) — configurável via .env
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: always
    ports:
      - "127.0.0.1:11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_MODELS=/models
      - OLLAMA_NUM_PARALLEL=4
    volumes:
      - ollama_data:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - crm_network

  # ── FERRAMENTA Whatsmeow (Go — WhatsApp) ─────────────────────
  # https://github.com/tulir/whatsmeow
  # Valida números + envia mensagens + recebe eventos
  # API: GET /validate?number=5541999990000
  whatsapp-service:
    build:
      context: ./whatsapp-service
      dockerfile: Dockerfile
    image: ghcr.io/fluowai/wootechcrm6-whatsapp:latest
    container_name: wootech_whatsapp_service
    restart: always
    ports:
      - "8080:8080"
    environment:
      - REDIS_URL=redis:6379
    depends_on:
      - redis
    volumes:
      - whatsapp_data:/app
    networks:
      - crm_network

volumes:
  postgres_data:
  redis_data:
  whatsapp_data:
  gosom_data:
  ollama_data:
