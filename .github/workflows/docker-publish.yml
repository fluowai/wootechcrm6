name: Build and Publish Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-crm:
    name: Build CRM App
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push CRM image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          cache-from: type=gha,scope=crm
          cache-to: type=gha,mode=max,scope=crm
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

  build-whatsapp:
    name: Build WhatsApp Service
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push WhatsApp service image
        uses: docker/build-push-action@v5
        with:
          context: ./whatsapp-service
          file: ./whatsapp-service/Dockerfile
          push: true
          cache-from: type=gha,scope=whatsapp
          cache-to: type=gha,mode=max,scope=whatsapp
          tags: |
            ghcr.io/${{ github.repository }}-whatsapp:latest
            ghcr.io/${{ github.repository }}-whatsapp:${{ github.sha }}

  build-cnpj:
    name: Build CNPJ Service
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push CNPJ image
        uses: docker/build-push-action@v5
        with:
          context: ./cnpj-service
          file: ./cnpj-service/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-cnpj-service:latest
            ghcr.io/${{ github.repository }}-cnpj-service:${{ github.sha }}

  build-colly:
    name: Build Colly Service
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Colly image
        uses: docker/build-push-action@v5
        with:
          context: ./colly-service
          file: ./colly-service/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-colly-service:latest
            ghcr.io/${{ github.repository }}-colly-service:${{ github.sha }}

  build-firecrawl:
    name: Build Firecrawl Service
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Clone Firecrawl
        run: git clone https://github.com/mendableai/firecrawl.git ./firecrawl-src
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Firecrawl image
        uses: docker/build-push-action@v5
        with:
          context: ./firecrawl-src/apps/api
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-firecrawl:latest
            ghcr.io/${{ github.repository }}-firecrawl:${{ github.sha }}
