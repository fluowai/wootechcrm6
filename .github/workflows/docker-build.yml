name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    paths:
      - 'cnpj-service/**'
      - 'colly-service/**'
      - '.github/workflows/docker-build.yml'
  workflow_dispatch: # Permite rodar manualmente no painel do GitHub

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push CNPJ Service
        uses: docker/build-push-action@v5
        with:
          context: ./cnpj-service
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-cnpj-service:latest

      - name: Build and push Colly Service
        uses: docker/build-push-action@v5
        with:
          context: ./colly-service
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-colly-service:latest
