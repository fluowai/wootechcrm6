version: "3.8"

services:
  # =========================================================================
  # NÚCLEO CRM
  # =========================================================================
  frontend:
    image: ghcr.io/fluowai/wootech-crm-frontend:latest
    environment:
      VITE_API_URL: "same-origin"
      VITE_LIVEKIT_URL: ""
      VITE_PANEL_URL: "https://crm.wootech.com.br"
      VITE_SUPABASE_URL: "https://ywvhfgvlnbigfmerilcq.supabase.co"
      VITE_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3dmhmZ3ZsbmJpZ2ZtZXJpbGNxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1MDYyOTEsImV4cCI6MjA5MzA4MjI5MX0.2FezfFHWhx7aXYKCTORnvDXeEDfshzHvzyiA9DMP5vs"
    networks:
      - wootech1
      - nexus360_internal
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=wootech1"
        - "traefik.http.routers.nexus360_frontend.rule=Host(`crm.wootech.com.br`)"
        - "traefik.http.routers.nexus360_frontend.entrypoints=websecure"
        - "traefik.http.routers.nexus360_frontend.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.nexus360_frontend.priority=10"
        - "traefik.http.routers.nexus360_frontend.service=nexus360_frontend"
        - "traefik.http.services.nexus360_frontend.loadbalancer.server.port=80"

  api:
    image: ghcr.io/fluowai/wootech-crm-api:latest
    environment:
      NODE_ENV: "production"
      PORT: "10000"
      FRONTEND_URL: "https://crm.wootech.com.br"
      CORS_ORIGINS: "https://crm.wootech.com.br,https://www.crm.wootech.com.br"
      WHITELABEL_DOCKER_IP: "207.58.153.219"
      WHITELABEL_CNAME_TARGET: "crm.wootech.com.br"
      TRAEFIK_SYNC_MODE: "docker-service"
      TRAEFIK_FRONTEND_URL: "http://nexus360_frontend:80"
      TRAEFIK_API_URL: "http://nexus360_api:10000"
      TRAEFIK_CERT_RESOLVER: "letsencryptresolver"
      TRAEFIK_ROUTER_SERVICE: "nexus360_frontend"
      TRAEFIK_ROUTER_LABEL_PREFIX: "nexus360_custom"
      TRAEFIK_DOCKER_NETWORK: "wootech1"
      DOCKER_SOCKET_PATH: "/var/run/docker.sock"
      DATABASE_URL: "postgresql://postgres.ywvhfgvlnbigfmerilcq:Q8YvwfX28WWhW3dz@aws-1-sa-east-1.pooler.supabase.com:6543/postgres?pgbouncer=true&sslmode=require&statement_cache_size=0"
      DIRECT_URL: "postgresql://postgres:Q8YvwfX28WWhW3dz@db.ywvhfgvlnbigfmerilcq.supabase.co:5432/postgres?sslmode=require&schema=public"
      SUPABASE_DB_URL: "postgresql://postgres.ywvhfgvlnbigfmerilcq:Q8YvwfX28WWhW3dz@aws-1-sa-east-1.pooler.supabase.com:6543/postgres?pgbouncer=true&sslmode=require&statement_cache_size=0"
      PGSSLMODE: "require"
      JWT_SECRET: "MTluDh9gIwUTonk9op8kRc3B/cYihNKj2RYPL8+0D1F6iCykx2shnfvPJLmJsJ/cn0z81JFY52G5os0hFjokuQ=="
      SUPABASE_URL: "https://ywvhfgvlnbigfmerilcq.supabase.co"
      SUPABASE_REST_URL: "https://ywvhfgvlnbigfmerilcq.supabase.co/rest/v1"
      SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3dmhmZ3ZsbmJpZ2ZtZXJpbGNxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1MDYyOTEsImV4cCI6MjA5MzA4MjI5MX0.2FezfFHWhx7aXYKCTORnvDXeEDfshzHvzyiA9DMP5vs"
      SUPABASE_SERVICE_ROLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3dmhmZ3ZsbmJpZ2ZtZXJpbGNxIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NzUwNjI5MSwiZXhwIjoyMDkzMDgyMjkxfQ.wIihcD0zm4rqQwvur7Smzy3-5sc0YJgTWwSQR5u47AE"
      SUPABASE_JWT_SECRET: "MTluDh9gIwUTonk9op8kRc3B/cYihNKj2RYPL8+0D1F6iCykx2shnfvPJLmJsJ/cn0z81JFY52G5os0hFjokuQ=="
      
      # ── Integração Inteligência Comercial ────────────────────────
      REDIS_URL: "redis://cache-redis:6379"
      SCRAPER_API_URL: "http://google-maps-scraper:8080"
      GOOGLE_MAPS_SCRAPER_URL: "http://google-maps-scraper:8080"
      GOOGLE_MAPS_SCRAPER_CONCURRENCY: "2"
      GOOGLE_MAPS_SCRAPER_JOB_TIMEOUT_MS: "240000"
      WHATSAPP_BRIDGE_URL: "http://whatsapp-bridge:8091"
      WHATSAPP_API_URL: "http://whatsapp-bridge:8091"
      WHATSAPP_BRIDGE_SECRET: "${WHATSAPP_BRIDGE_SECRET:-dev-whatsapp-bridge-secret}"
      BROWSERLESS_URL: "ws://browserless:3000"
      BROWSERLESS_TOKEN: "wootech-prod-token"
      FIRECRAWL_URL: "http://firecrawl:3002"
      FIRECRAWL_API_KEY: "local"
      UNSTRUCTURED_URL: "http://unstructured:8000"
      CNPJ_SERVICE_URL: "http://cnpj-service:4000"
      COLLY_SERVICE_URL: "http://colly-service:5000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      wootech1:
      nexus360_internal:
        aliases:
          - backend
          - nexus360_api
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any
      update_config:
        order: stop-first
        failure_action: rollback
      rollback_config:
        order: stop-first
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=wootech1"
        - "traefik.http.routers.nexus360_api.rule=Host(`crm.wootech.com.br`) && (PathPrefix(`/api`) || PathPrefix(`/lp`))"
        - "traefik.http.routers.nexus360_api.entrypoints=websecure"
        - "traefik.http.routers.nexus360_api.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.nexus360_api.priority=20"
        - "traefik.http.routers.nexus360_api.service=nexus360_api"
        - "traefik.http.services.nexus360_api.loadbalancer.server.port=10000"


  # =========================================================================
  # SERVIÇOS AUXILIARES DE ESTADO (REDIS / POSTGRES LOCAL)
  # =========================================================================
  cache-redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru
    volumes:
      - nexus360_redis_data:/data
    networks:
      - nexus360_internal
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      resources:
        limits:
          memory: 1.5G

  cache-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: wootech
      POSTGRES_PASSWORD: wootech_cache_pwd
      POSTGRES_DB: local_cache_db
    volumes:
      - nexus360_pgcache_data:/var/lib/postgresql/data
    networks:
      - nexus360_internal
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      resources:
        limits:
          memory: 1G


  # =========================================================================
  # MICROSSERVIÇOS DE LEAD INTELLIGENCE (Rede Interna Oculta)
  # =========================================================================
  google-maps-scraper:
    image: ghcr.io/fluowai/wootech-crm-google-maps-scraper:latest
    command:
      - "-web"
      - "-addr"
      - ":8080"
      - "-data-folder"
      - "/gmapsdata"
      - "-c"
      - "2"
      - "-browser-pool-size"
      - "1"
    volumes:
      - google_maps_scraper_data:/gmapsdata
    networks:
      - nexus360_internal
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      resources:
        limits:
          memory: 2G
    stop_grace_period: 30s

  whatsapp-bridge:
    image: ghcr.io/fluowai/wootech-crm-whatsapp-bridge:latest
    environment:
      WHATSAPP_BRIDGE_ADDR: ":8091"
      WHATSAPP_BRIDGE_SECRET: "${WHATSAPP_BRIDGE_SECRET:-dev-whatsapp-bridge-secret}"
      WHATSAPP_BRIDGE_PUBLIC_URL: "https://crm.wootech.com.br"
      NEXUS_BACKEND_URL: "http://backend:10000"
      REDIS_URL: "redis://cache-redis:6379"
    volumes:
      - whatsapp_bridge_data:/app/data
    networks:
      nexus360_internal:
        aliases:
          - whatsapp-bridge
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  browserless:
    image: ghcr.io/browserless/chromium:latest
    environment:
      - CONCURRENT=15
      - TIMEOUT=60000
      - TOKEN=wootech-prod-token
      - QUEUE_LENGTH=30
      - PREBOOT_CHROME=true
    networks:
      - nexus360_internal
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      resources:
        limits:
          memory: 3G

  firecrawl:
    image: ghcr.io/mendableai/firecrawl:latest
    environment:
      - REDIS_URL=redis://cache-redis:6379
      - PLAYWRIGHT_MICROSERVICE_URL=http://browserless:3000
      - USE_DB_AUTHENTICATION=false
      - PORT=3002
      - FIRECRAWL_API_KEY=local
      - NUM_WORKERS_PER_QUEUE=4
      - BULL_AUTH_KEY=wootech-firecrawl
    networks:
      - nexus360_internal
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      resources:
        limits:
          memory: 2G

  unstructured:
    image: downloads.unstructured.io/unstructured-io/unstructured-api:latest
    environment:
      - PORT=8000
      - UNSTRUCTURED_API_KEY=local
    networks:
      - nexus360_internal
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      resources:
        limits:
          memory: 2G

  cnpj-service:
    # A imagem precisa ser buildada e enviada para o seu GHCR (ou construída no servidor)
    image: ghcr.io/fluowai/wootech-cnpj-service:latest
    environment:
      - PORT=4000
      - REDIS_URL=redis://cache-redis:6379
      - DATABASE_URL=postgresql://wootech:wootech_cache_pwd@cache-db:5432/local_cache_db
    networks:
      - nexus360_internal
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  colly-service:
    # A imagem precisa ser buildada e enviada para o seu GHCR (ou construída no servidor)
    image: ghcr.io/fluowai/wootech-colly-service:latest
    environment:
      - PORT=5000
    networks:
      - nexus360_internal
    deploy:
      replicas: 1
      restart_policy:
        condition: any


# =========================================================================
# VOLUMES & REDES
# =========================================================================
volumes:
  google_maps_scraper_data:
    name: nexus360_google_maps_scraper_data
  whatsapp_bridge_data:
    name: nexus360_whatsapp_bridge_data
  nexus360_redis_data:
    name: nexus360_redis_data
  nexus360_pgcache_data:
    name: nexus360_pgcache_data

networks:
  wootech1:
    external: true
  nexus360_internal:
    driver: overlay
    attachable: true
