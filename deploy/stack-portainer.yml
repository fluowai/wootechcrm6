    image: ghcr.io/fluowai/wootechcrm6:latest
    environment:
      NODE_ENV: "production"
      PORT: "3000"
      FRONTEND_URL: "https://crm.wootech.com.br"
      CORS_ORIGINS: "https://crm.wootech.com.br,https://www.crm.wootech.com.br"
      WHITELABEL_DOCKER_IP: "207.58.153.219"
      WHITELABEL_CNAME_TARGET: "crm.wootech.com.br"
      TRAEFIK_SYNC_MODE: "docker-service"
      TRAEFIK_CERT_RESOLVER: "letsencryptresolver"
      TRAEFIK_DOCKER_NETWORK: "wootech1"
      DOCKER_SOCKET_PATH: "/var/run/docker.sock"
      DATABASE_URL: "postgresql://postgres.omxbbhxrwftcklmsaasa:UzrVZyiiBwohfOA1@aws-0-sa-east-1.pooler.supabase.com:6543/postgres?pgbouncer=true&sslmode=require&statement_cache_size=0"
