      SUPABASE_DB_URL: "postgresql://postgres.omxbbhxrwftcklmsaasa:UzrVZyiiBwohfOA1@aws-0-sa-east-1.pooler.supabase.com:6543/postgres?pgbouncer=true&sslmode=require&statement_cache_size=0"
      PGSSLMODE: "require"
      JWT_SECRET: "gzLMVjICNir/0sENLgoi3MNceYz+kMPdr8IAkiEbw7rfrjnpffvhqWwu+PkUB14JrpliFdD4e0n+kZGoE9NmvQ=="
      SUPABASE_URL: "https://omxbbhxrwftcklmsaasa.supabase.co"
      SUPABASE_REST_URL: "https://omxbbhxrwftcklmsaasa.supabase.co/rest/v1"
      SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9teGJiaHhyd2Z0Y2tsbXNhYXNhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ3NDk2MzQsImV4cCI6MjEwMDMyNTYzNH0.NlZwUOf7OXkrNPxbwlhFr-Zo7cEw9nrnQoaBBjXAdHM"
      VITE_SUPABASE_URL: "https://omxbbhxrwftcklmsaasa.supabase.co"
      VITE_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9teGJiaHhyd2Z0Y2tsbXNhYXNhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ3NDk2MzQsImV4cCI6MjEwMDMyNTYzNH0.NlZwUOf7OXkrNPxbwlhFr-Zo7cEw9nrnQoaBBjXAdHM"
      SUPABASE_SERVICE_ROLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9teGJiaHhyd2Z0Y2tsbXNhYXNhIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4NDc0OTYzNCwiZXhwIjoyMTAwMzI1NjM0fQ.V07J9q1nn0ezuWLgvm0GcBvQ_zHsOuFv6CsEWu949b0"
      SUPABASE_JWT_SECRET: "gzLMVjICNir/0sENLgoi3MNceYz+kMPdr8IAkiEbw7rfrjnpffvhqWwu+PkUB14JrpliFdD4e0n+kZGoE9NmvQ=="

      # ── Integração Inteligência Comercial ────────────────────────
      REDIS_URL: "redis://cache-redis:6379"
      WHATSAPP_BRIDGE_URL: "http://whatsapp-bridge:8091"
      WHATSAPP_BRIDGE_SECRET: "wootech-wa-bridge-prod-2026"
      BROWSERLESS_URL: "ws://browserless:3000"
      BROWSERLESS_TOKEN: "wootech-prod-token"

      # ROTAÇÃO DE CHAVES DO FIRECRAWL EM NUVEM
      FIRECRAWL_URL: "https://api.firecrawl.dev"
      FIRECRAWL_API_KEY: "fc-519978c366ad4871a49f507328c9dce5"

      UNSTRUCTURED_URL: "http://unstructured:8000"
      CNPJ_SERVICE_URL: "http://cnpj-service:4000"
      COLLY_SERVICE_URL: "http://colly-service:5000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      wootech1:
      wootechcrm6_internal:
        aliases:
          - backend
          - app
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any
      update_config:
        order: stop-first
        failure_action: rollback
      rollback_config:
        order: stop-first
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=wootech1"
        - "traefik.http.routers.wootechcrm6.rule=Host(`crm.wootech.com.br`)"
        - "traefik.http.routers.wootechcrm6.entrypoints=websecure"
        - "traefik.http.routers.wootechcrm6.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.wootechcrm6.priority=10"
        - "traefik.http.routers.wootechcrm6.service=wootechcrm6"
        - "traefik.http.services.wootechcrm6.loadbalancer.server.port=3000"

  # =========================================================================
  # SERVIÇOS AUXILIARES DE ESTADO (REDIS)
  # =========================================================================
  cache-redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru
    volumes:
      - wootechcrm6_redis_data:/data
    networks:
      - wootechcrm6_internal
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      resources:
        limits:
          memory: 1.5G

  whatsapp-bridge:
    image: ghcr.io/fluowai/wootechcrm6-whatsapp:latest
    environment:
      WHATSAPP_BRIDGE_ADDR: ":8091"
      WHATSAPP_BRIDGE_SECRET: "wootech-wa-bridge-prod-2026"
      WHATSAPP_BRIDGE_PUBLIC_URL: "https://crm.wootech.com.br"
      NEXUS_BACKEND_URL: "http://backend:10000"
      REDIS_URL: "redis://cache-redis:6379"
    volumes:
      - whatsapp_bridge_data:/app/data
    networks:
      wootechcrm6_internal:
        aliases:
          - whatsapp-bridge
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  browserless:
    image: ghcr.io/browserless/chromium:latest
    environment:
      - CONCURRENT=15
      - TIMEOUT=60000
      - TOKEN=wootech-prod-token
      - QUEUE_LENGTH=30
      - PREBOOT_CHROME=true
    networks:
      - wootechcrm6_internal
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      resources:
        limits:
          memory: 3G

  unstructured:
    image: downloads.unstructured.io/unstructured-io/unstructured-api:latest
    environment:
      - PORT=8000
      - UNSTRUCTURED_API_KEY=local
    networks:
      - wootechcrm6_internal
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      resources:
        limits:
          memory: 2G

  cnpj-service:
    image: ghcr.io/fluowai/wootechcrm6-cnpj-service:latest
    environment:
      - PORT=4000
      - REDIS_URL=redis://cache-redis:6379
      - DATABASE_URL=postgresql://postgres.omxbbhxrwftcklmsaasa:UzrVZyiiBwohfOA1@aws-0-sa-east-1.pooler.supabase.com:6543/postgres?pgbouncer=true&sslmode=require&statement_cache_size=0
    networks:
      - wootechcrm6_internal
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  colly-service:
    image: ghcr.io/fluowai/wootechcrm6-colly-service:latest
    environment:
      - PORT=5000
    networks:
      - wootechcrm6_internal
    deploy:
      replicas: 1
      restart_policy:
        condition: any


# =========================================================================
# VOLUMES & REDES
# =========================================================================
volumes:
  whatsapp_bridge_data:
    name: wootechcrm6_whatsapp_bridge_data
  wootechcrm6_redis_data:
    name: wootechcrm6_redis_data

networks:
  wootech1:
    external: true
  wootechcrm6_internal:
    driver: overlay
    attachable: true
